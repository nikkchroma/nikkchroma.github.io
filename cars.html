<!DOCTYPE html>
<html>
<head>
<title>Cars Collection | Nikkchroma</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
<style>
body { background:#0b0b0b; color:white; font-family:Montserrat; margin:0; padding:50px;}
.gallery { column-count:3; column-gap:20px;}
.gallery img { width:100%; margin-bottom:20px; border-radius:10px; }
a { color:white; text-decoration:none;}

/* LIGHTBOX */

#lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(177,18,38,0.4);
    animation: zoomIn 0.3s ease;
}

/* ===== PRO LIGHTBOX ===== */

#lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    animation: fadeIn 0.3s ease;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 14px;
    box-shadow: 0 0 50px rgba(177,18,38,0.5);
    animation: zoomIn 0.3s ease;
}

.lb-close,
.lb-prev,
.lb-next {
    position: absolute;
    color: white;
    font-size: 40px;
    cursor: pointer;
    user-select: none;
}

.lb-close {
    top: 30px;
    right: 40px;
}

.lb-prev {
    left: 40px;
    top: 50%;
    transform: translateY(-50%);
}

.lb-next {
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes zoomIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

#closeBtn {
    position: absolute;
    top: 30px;
    right: 40px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}

@keyframes zoomIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>

<h1>Cars Collection</h1>
<br>
<a href="index.html">← Back to Home</a>
<br><br>

<div class="gallery">
<img src="car1.jpg">
<img src="car2.jpg">
<img src="car3.jpg">
<img src="car4.jpg">
<img src="car5.jpg">
<img src="car6.jpg">
<img src="car7.jpg">
<img src="car8.jpg">
<img src="car9.jpg">
<img src="car10.jpg">
</div>

<div id="lightbox">
    <span id="closeBtn">&times;</span>
    <img id="lightboxImg">
</div>

<script>
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const closeBtn = document.getElementById('closeBtn');

images.forEach(img => {
    img.addEventListener('click', () => {
        lightbox.style.display = 'flex';
        lightboxImg.src = img.src;
    });
});

closeBtn.addEventListener('click', () => {
    lightbox.style.display = 'none';
});

lightbox.addEventListener('click', (e) => {
    if (e.target !== lightboxImg) {
        lightbox.style.display = 'none';
    }
});
</script>

<div id="lightbox">
    <span class="lb-close">&times;</span>
    <span class="lb-prev">&#10094;</span>
    <img id="lightbox-img">
    <span class="lb-next">&#10095;</span>
</div>

<script>
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const closeBtn = document.querySelector('.lb-close');
const nextBtn = document.querySelector('.lb-next');
const prevBtn = document.querySelector('.lb-prev');

let currentIndex = 0;
const imageArray = Array.from(images);

images.forEach((img, index) => {
    img.addEventListener('click', () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = 'flex';
    });
});

function showImage() {
    lightboxImg.src = imageArray[currentIndex].src;
}

nextBtn.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % imageArray.length;
    showImage();
});

prevBtn.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + imageArray.length) % imageArray.length;
    showImage();
});

closeBtn.addEventListener('click', () => {
    lightbox.style.display = 'none';
});

lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) {
        lightbox.style.display = 'none';
    }
});

document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") lightbox.style.display = 'none';
    if (e.key === "ArrowRight") nextBtn.click();
    if (e.key === "ArrowLeft") prevBtn.click();
});
</script>

</body>
</html>
