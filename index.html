<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikkchroma | Automotive Visuals</title>

<meta name="description" content="Nikkchroma - Automotive photographer in Chennai specializing in superbike photography, car meets, and cinematic rollers.">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">

<style>

/* ---------- GLOBAL ---------- */

html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #0b0b0b;
    color: white;
    animation: pageFade 1s ease;
    transition: opacity 0.4s ease;
}

@keyframes pageFade {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* ---------- PROGRESS BAR ---------- */

#progressBar {
    position: fixed;
    top: 0;
    left: 0;
    height: 4px;
    width: 0%;
    background: linear-gradient(90deg, #b11226, #ff3c00);
    z-index: 2000;
}

/* ---------- NAVBAR ---------- */

nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 10%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 1000;
    animation: navSlide 1s ease;
}

@keyframes navSlide {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

nav h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 3px;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
}

/* ---------- HERO ---------- */

.hero {
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 20px;
    overflow: hidden;
}

.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.75)),
        url("hero.jpg") center/cover no-repeat;
    background-attachment: fixed;
    z-index: -1;
    animation: slowZoom 20s ease-in-out infinite alternate;
}

@keyframes slowZoom {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

.hero h2 {
    font-size: 64px;
    animation: heroText 1.2s ease forwards;
    opacity: 0;
}

.hero p {
    font-size: 26px;
    animation: heroText 1.6s ease forwards;
    opacity: 0;
}

@keyframes heroText {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* ---------- BUTTONS ---------- */

.btn {
    background: linear-gradient(135deg, #b11226, #8e0f1f);
    padding: 14px 28px;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    display: inline-block;
    font-weight: 600;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(177,18,38,0.3);
    position: relative;
    overflow: hidden;
}

.btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(177,18,38,0.5);
}

.btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: 0.5s;
}

.btn:hover::before {
    left: 100%;
}

/* ---------- SECTIONS ---------- */

.section {
    padding: 100px 10%;
}

.fade-in {
    opacity: 0;
    transform: scale(0.95);
    filter: blur(5px);
    transition: 1s ease;
}

.fade-in.show {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
}

/* ---------- FOLDERS ---------- */

.folder-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
    margin-top: 50px;
}

.folder-cover {
    height: 260px;
    border-radius: 15px;
    background-size: cover;
    background-position: center;
    position: relative;
    overflow: hidden;
    transition: 0.4s ease;
}

.folder-cover:hover {
    transform: scale(1.07);
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
}

.folder-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 25px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    font-size: 22px;
    font-weight: 600;
}

/* ---------- FOOTER ---------- */

footer {
    text-align: center;
    padding: 40px;
    background: #000;
}

</style>
</head>
<body>

<div id="progressBar"></div>

<nav>
<h1>NIKKCHROMA</h1>
<div>
<a href="#portfolio">Portfolio</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</div>
</nav>

<section class="hero">
<div>
<h2>Visuals that Slap</h2>
<p>Motorsport Photography & Cinematic Rollers | Chennai</p>
<br>
<a class="btn" href="#portfolio">View Portfolio</a>
</div>
</section>

<section class="section fade-in" id="portfolio">
<h2>Portfolio</h2>
<div class="folder-grid">
<a href="cars.html">
<div class="folder-cover" style="background-image: url('cars-cover.jpg');">
<div class="folder-overlay">Cars Collection</div>
</div>
</a>
<a href="bikes.html">
<div class="folder-cover" style="background-image: url('bikes-cover.jpg');">
<div class="folder-overlay">Superbikes Collection</div>
</div>
</a>
<a href="rollers.html">
<div class="folder-cover" style="background-image: url('rollers-cover.jpg');">
<div class="folder-overlay">Rollers Collection</div>
</div>
</a>
</div>
</section>

<footer>
© 2026 Nikkchroma | Chennai Automotive Visuals
</footer>

<script>

/* Scroll Reveal */
const faders = document.querySelectorAll('.fade-in');
const observer = new IntersectionObserver(entries => {
entries.forEach(entry => {
if (!entry.isIntersecting) return;
entry.target.classList.add('show');
});
});
faders.forEach(el => observer.observe(el));

/* Progress Bar */
window.addEventListener("scroll", () => {
let scrollTop = document.documentElement.scrollTop;
let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
let percent = (scrollTop / height) * 100;
document.getElementById("progressBar").style.width = percent + "%";
});

</script>

</body>
</html>
