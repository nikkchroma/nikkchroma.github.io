<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikkchroma | Automotive Visuals</title>

<meta name="description" content="Nikkchroma - Automotive photographer in Chennai specializing in superbike photography, car meets, and cinematic rollers.">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">

<style>

body {
    animation: pageFade 1s ease;
}

@keyframes pageFade {
    from { opacity: 0; }
    to { opacity: 1; }
}

nav {
    animation: navSlide 1s ease;
}

@keyframes navSlide {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

html { scroll-behavior: smooth; }

#progressBar {
    position: fixed;
    top: 0;
    left: 0;
    height: 4px;
    width: 0%;
    background: linear-gradient(90deg, #b11226, #ff3c00);
    z-index: 2000;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #0b0b0b;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 10%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 3px;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
}

/* HERO */
.hero {
    height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 20px;
    overflow: hidden;
}

.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.75)),
        url("hero.jpg") center/cover no-repeat;
    z-index: -1;
    animation: slowZoom 20s ease-in-out infinite alternate;
}
    
.hero::before {
    background-attachment: fixed;
}

@keyframes slowZoom {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

.hero h2 {
    animation: heroText 1.2s ease forwards;
    opacity: 0;
}

.hero p {
    animation: heroText 1.6s ease forwards;
    opacity: 0;
}

@keyframes heroText {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* BUTTON */
.btn {
    background: linear-gradient(135deg, #b11226, #8e0f1f);
    padding: 14px 28px;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    display: inline-block;
    font-weight: 600;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(177,18,38,0.3);
}

.btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(177,18,38,0.5);
}

.btn {
    position: relative;
    overflow: hidden;
}

.btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: 0.5s;
}

.btn:hover::before {
    left: 100%;
}

.contact-buttons {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: flex-start;
}

/* SECTION */
.section {
    padding: 100px 10%;
}

.fade-in {
    opacity: 0;
    transform: scale(0.95);
    filter: blur(5px);
    transition: 1s ease;
}

.fade-in.show {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
}

/* FOLDER GRID */
.folder-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
    margin-top: 50px;
}

.folder-card {
    text-decoration: none;
}

.folder-cover {
    height: 260px;
    border-radius: 15px;
    background-size: cover;
    background-position: center;
    position: relative;
    overflow: hidden;
    transition: 0.4s ease;
}

.folder-cover:hover {
    transform: scale(1.07);
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
}

.folder-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 25px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
}

.folder-cover {
    transition: all 0.4s ease;
}

.folder-cover:hover {
    transform: scale(1.05);
    box-shadow: 0 20px 50px rgba(177,18,38,0.4);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    background: #000;
}

.stats {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 40px;
}

.stats h3 {
    font-size: 40px;
    color: #b11226;
}

.cursor-glow {
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(177,18,38,0.2), transparent 60%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;
}

.section h2 {
    position: relative;
    display: inline-block;
}

.section h2::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -10px;
    width: 0%;
    height: 3px;
    background: #b11226;
    transition: 0.5s ease;
}

.section.show h2::after {
    width: 100%;
}

#loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 5000;
    animation: fadeOut 1s ease forwards;
    animation-delay: 2s;
}

#loader h1 {
    font-size: 40px;
    letter-spacing: 5px;
    animation: pulse 2s ease infinite;
}

@keyframes pulse {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
}

@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

.engine-start {
    position: absolute;
    z-index: 3;
    background: rgba(0,0,0,0.7);
    padding: 18px 35px;
    border: 2px solid #b11226;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.3s ease;
}

.engine-start:hover {
    background: #b11226;
}

.hero-video {
    opacity: 0;
    transition: 1s ease;
}

.rpm {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 4px solid #333;
    overflow: hidden;
}

.rpm-fill {
    background: #b11226;
    width: 100%;
    height: 0%;
    position: absolute;
    bottom: 0;
    transition: 0.2s ease;
}

</style>
</head>
<body>

<div id="loader">
    <h1>NIKKCHROMA</h1>
</div>

<div class="cursor-glow"></div>

<nav>
<h1>NIKKCHROMA</h1>
<div>
<a href="#portfolio">Portfolio</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</div>
</nav>

<div class="rpm">
    <div class="rpm-fill"></div>
</div>

<div id="progressBar"></div>

<div id="engineStart" class="engine-start">
    START ENGINE
</div>

<section class="hero">
<div>
<h2>Visuals that Slap</h2>
<p>Motorsport Photography & Cinematic Rollers | Chennai</p>
<br>
<a class="btn" href="#portfolio">View Portfolio</a>
</div>
</section>

<!-- Remaining sections and scripts exactly as you originally posted -->

</body>
</html>
