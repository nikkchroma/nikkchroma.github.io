<!DOCTYPE html>
<html>
<head>
<title>Bikes Collection | Nikkchroma</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
<style>
body { background:#0b0b0b; color:white; font-family:Montserrat; margin:0; padding:50px;}
.gallery { column-count:20; column-gap:30px;}
.gallery img { width:100%; margin-bottom:20px; border-radius:10px; }
a { color:white; text-decoration:none;}
/* LIGHTBOX */

#lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(177,18,38,0.4);
    animation: zoomIn 0.3s ease;
}

#closeBtn {
    position: absolute;
    top: 30px;
    right: 40px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}

@keyframes zoomIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>

<h1>Bikes Collection</h1>
<br>
<a href="index.html">← Back to Home</a>
<br><br>

<div class="gallery">
<img src="bike1.jpg">
<img src="bike2.jpg">
<img src="bike3.jpg">
<img src="bike4.jpg">
<img src="bike5.jpg">
<img src="bike6.jpg">
<img src="bike7.jpg">
<img src="bike8.jpg">
<img src="bike9.jpg">
<img src="bike10.jpg">
</div>

<div id="lightbox">
    <span id="closeBtn">&times;</span>
    <img id="lightboxImg">
</div>

<script>
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const closeBtn = document.getElementById('closeBtn');

images.forEach(img => {
    img.addEventListener('click', () => {
        lightbox.style.display = 'flex';
        lightboxImg.src = img.src;
    });
});

closeBtn.addEventListener('click', () => {
    lightbox.style.display = 'none';
});

lightbox.addEventListener('click', (e) => {
    if (e.target !== lightboxImg) {
        lightbox.style.display = 'none';
    }
});
</script>

</body>
</html>
